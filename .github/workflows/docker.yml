name: docker

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  pull_request:
    branches: [main]
    paths: [Dockerfile]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: fwd2email:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify container runs
        run: |
          output=$(docker run --rm fwd2email:test 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "required config is not set"
